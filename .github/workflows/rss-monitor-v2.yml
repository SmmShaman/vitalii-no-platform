name: RSS Monitor v2

on:
  schedule:
    # Run every 30 minutes — scans ALL sources across 4 batches of 8
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Batch 0 (sources 0-7)
        id: batch0
        env:
          SUPABASE_MGMT_PAT: ${{ secrets.SUPABASE_MGMT_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📰 RSS Monitor v2 — Batch 0 ($(date -u '+%H:%M UTC'))"
          node scripts/bypass/monitor-rss.mjs --batch 0 --batch-size 8
          echo "analyzed_0=done" >> $GITHUB_OUTPUT

      - name: Batch 1 (sources 8-15)
        id: batch1
        env:
          SUPABASE_MGMT_PAT: ${{ secrets.SUPABASE_MGMT_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📰 RSS Monitor v2 — Batch 1"
          node scripts/bypass/monitor-rss.mjs --batch 1 --batch-size 8

      - name: Batch 2 (sources 16-23)
        id: batch2
        env:
          SUPABASE_MGMT_PAT: ${{ secrets.SUPABASE_MGMT_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📰 RSS Monitor v2 — Batch 2"
          node scripts/bypass/monitor-rss.mjs --batch 2 --batch-size 8

      - name: Batch 3 (sources 24-31)
        id: batch3
        env:
          SUPABASE_MGMT_PAT: ${{ secrets.SUPABASE_MGMT_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📰 RSS Monitor v2 — Batch 3"
          node scripts/bypass/monitor-rss.mjs --batch 3 --batch-size 8

      - name: Summary
        if: always()
        run: |
          echo "## RSS Monitor v2 Summary (Bypass Mode)" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** Direct Management API (Supabase 402 bypass)" >> $GITHUB_STEP_SUMMARY
