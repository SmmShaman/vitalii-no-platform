name: RSS Monitor v2

on:
  schedule:
    # Run every 30 minutes — scans ALL sources across 4 batches of 8
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PROJECT_REF: uchmopqiylywnemvjttl

    steps:
      - name: Fetch service_role key
        id: keys
        env:
          SUPABASE_MGMT_PAT: ${{ secrets.SUPABASE_MGMT_PAT }}
        run: |
          SRV=$(curl -fsS --max-time 15 \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/api-keys" \
            -H "Authorization: Bearer $SUPABASE_MGMT_PAT" \
            | jq -r '.[] | select(.name=="service_role") | .api_key')
          if [ -z "$SRV" ]; then echo "::error::Failed to fetch service_role key"; exit 1; fi
          echo "::add-mask::$SRV"
          echo "srv=$SRV" >> $GITHUB_OUTPUT

      - name: Batch 0 (sources 0-7)
        continue-on-error: true
        env:
          SRV: ${{ steps.keys.outputs.srv }}
        run: |
          echo "📰 RSS Monitor v2 (Edge Function) — Batch 0 ($(date -u '+%H:%M UTC'))"
          RESPONSE=$(curl -fsS --max-time 600 \
            -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/monitor-rss-sources" \
            -H "Authorization: Bearer $SRV" \
            -H "Content-Type: application/json" \
            -d '{"batchIndex":0,"batchSize":8}')
          echo "$RESPONSE" | jq '.' || echo "$RESPONSE"

      - name: Batch 1 (sources 8-15)
        continue-on-error: true
        env:
          SRV: ${{ steps.keys.outputs.srv }}
        run: |
          echo "📰 RSS Monitor v2 — Batch 1"
          RESPONSE=$(curl -fsS --max-time 600 \
            -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/monitor-rss-sources" \
            -H "Authorization: Bearer $SRV" \
            -H "Content-Type: application/json" \
            -d '{"batchIndex":1,"batchSize":8}')
          echo "$RESPONSE" | jq '.' || echo "$RESPONSE"

      - name: Batch 2 (sources 16-23)
        continue-on-error: true
        env:
          SRV: ${{ steps.keys.outputs.srv }}
        run: |
          echo "📰 RSS Monitor v2 — Batch 2"
          RESPONSE=$(curl -fsS --max-time 600 \
            -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/monitor-rss-sources" \
            -H "Authorization: Bearer $SRV" \
            -H "Content-Type: application/json" \
            -d '{"batchIndex":2,"batchSize":8}')
          echo "$RESPONSE" | jq '.' || echo "$RESPONSE"

      - name: Batch 3 (sources 24-31)
        continue-on-error: true
        env:
          SRV: ${{ steps.keys.outputs.srv }}
        run: |
          echo "📰 RSS Monitor v2 — Batch 3"
          RESPONSE=$(curl -fsS --max-time 600 \
            -X POST "https://${PROJECT_REF}.supabase.co/functions/v1/monitor-rss-sources" \
            -H "Authorization: Bearer $SRV" \
            -H "Content-Type: application/json" \
            -d '{"batchIndex":3,"batchSize":8}')
          echo "$RESPONSE" | jq '.' || echo "$RESPONSE"

      - name: Summary
        if: always()
        run: |
          echo "## RSS Monitor v2 Summary (Edge Function)" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** Edge Function (analyze-rss-article does full URL fetch)" >> $GITHUB_STEP_SUMMARY
