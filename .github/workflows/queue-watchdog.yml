name: Publish Queue Watchdog

on:
  schedule:
    # Run every 10 minutes — cleans zombie articles and handles stale scheduled items
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Zombie cleanup & schedule backup
        env:
          SUPABASE_MGMT_PAT: ${{ secrets.SUPABASE_MGMT_PAT }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          echo "🧟 Queue Watchdog — $(date -u '+%H:%M UTC')"

          node --input-type=module << 'EOF'
          import { dbQuery, sq } from './scripts/bypass/db.mjs'

          const cutoff = new Date(Date.now() - 10 * 60 * 1000).toISOString()
          const staleCutoff = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString()

          // Clean zombies
          const zombies = await dbQuery(`
            UPDATE public.news
            SET auto_publish_status = 'failed',
                auto_publish_error = 'Zombie: watchdog auto-cleaned after 10min timeout'
            WHERE auto_publish_status IN ('pending','variant_selection','image_generation','content_rewrite','social_posting')
              AND auto_publish_started_at < ${sq(cutoff)}
            RETURNING id
          `)
          console.log(`🧟 Cleaned ${zombies?.length || 0} zombie(s)`)

          // Clean stale scheduled (>24h)
          const stale = await dbQuery(`
            UPDATE public.news
            SET auto_publish_status = 'failed',
                auto_publish_error = 'Stale: scheduled >24h ago, never picked up'
            WHERE auto_publish_status = 'scheduled'
              AND scheduled_publish_at < ${sq(staleCutoff)}
            RETURNING id
          `)
          console.log(`📅 Cleaned ${stale?.length || 0} stale scheduled article(s)`)

          console.log('✅ Watchdog complete')
          EOF
