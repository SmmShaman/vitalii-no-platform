name: Auto-reject stale news

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  auto-reject:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-reject stale news
        id: reject
        env:
          SUPABASE_MGMT_PAT: ${{ secrets.SUPABASE_MGMT_PAT }}
        run: |
          echo "🤖 Auto-reject stale news — $(date -u '+%H:%M UTC')"

          node --input-type=module << 'EOF'
          import { dbQuery, sq } from './scripts/bypass/db.mjs'

          const cutoff48h = new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString()

          // Reject pending articles older than 48h.
          // Important: only reject articles that are NOT already published —
          // otherwise we end up with the buggy state is_published=true +
          // pre_moderation_status='rejected' which makes broken/empty rows
          // appear at the top of the public feed.
          const pendingRejected = await dbQuery(`
            UPDATE public.news
            SET pre_moderation_status = 'rejected',
                rejection_reason = 'Auto-rejected: pending for more than 48 hours'
            WHERE pre_moderation_status = 'pending'
              AND (is_published = false OR is_published IS NULL)
              AND created_at < ${sq(cutoff48h)}
            RETURNING id
          `)

          // Reject approved-but-unpublished articles older than 48h
          const approvedRejected = await dbQuery(`
            UPDATE public.news
            SET pre_moderation_status = 'rejected',
                rejection_reason = 'Auto-rejected: approved but not published within 48 hours'
            WHERE pre_moderation_status = 'approved'
              AND (is_published = false OR is_published IS NULL)
              AND (published_at IS NULL)
              AND created_at < ${sq(cutoff48h)}
            RETURNING id
          `)

          const total = (pendingRejected?.length || 0) + (approvedRejected?.length || 0)
          console.log(`📊 Rejected ${pendingRejected?.length || 0} pending + ${approvedRejected?.length || 0} approved-stale = ${total} total`)
          console.log(`REJECTED_COUNT=${total}`)
          EOF

      - name: Summary
        if: always()
        run: |
          echo "## Auto-reject Stale News Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "News items pending or approved but not published within 48 hours are automatically rejected." >> $GITHUB_STEP_SUMMARY
